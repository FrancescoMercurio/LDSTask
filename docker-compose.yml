services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  clienti-service:
    container_name: clienti-service
    build:
      context: .
      dockerfile: clienti-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/clienti_db
    ports:
      - "8081:8080"
    depends_on:
      mongodb:
        condition: service_healthy

  conti-service:
    container_name: conti-service
    build:
      context: .
      dockerfile: conti-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/conti_db
      CLIENTI_SERVICE_URL: http://clienti-service:8080
    ports:
      - "8082:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      clienti-service:
        condition: service_started

volumes:
  mongo-data:
